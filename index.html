<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>씨앤코 현장주소</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f8; 
            padding: 0; /* body 패딩 제거 (상단 고정을 위해) */
            margin: 0;
            text-align: center; 
        }

        /* 제목 부분 */
        h2 { color: #2c3e50; margin: 20px 0; font-size: 1.5rem; }

        /* 검색 박스를 상단에 고정하는 핵심 스타일 */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #f4f7f8; /* 배경색과 맞춰서 스크롤 시 뒤쪽 글자가 안 보이게 */
            padding: 10px;
        }

        .search-box { 
            background-color: #fff9c4; 
            padding: 15px; 
            border-radius: 15px; 
            border: 3px solid #fbc02d; 
            display: block; 
            margin: 0 auto; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            width: 100%;
        }

        input { 
            padding: 12px; 
            font-size: 18px; 
            border-radius: 10px; 
            border: 1px solid #ccc; 
            width: 100%; 
            box-sizing: border-box; 
            outline: none; 
        }

        /* 결과 리스트 영역에 여백 추가 */
        #results {
            padding: 10px;
        }

        .result-item { 
            background: white; 
            border: 1px solid #eee; 
            margin: 10px 0; 
            padding: 15px; 
            width: 100%; 
            max-width: none; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            position: relative; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            box-sizing: border-box;
            text-align: left;
        }

        .info-text { 
            margin-bottom: 5px; 
            font-size: 15px; 
            color: #333; 
            line-height: 1.4;
            padding-right: 85px; 
        }
        .info-text b { color: #2e7d32; }

        .copy-btn { 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            background-color: #4caf50; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px;
        }
        .copy-btn:active { background-color: #388e3c; }

        #loading { font-size: 18px; color: #666; margin-top: 50px; }

        @media (min-width: 800px) {
            .sticky-wrapper, .result-item { max-width: 800px; margin-left: auto; margin-right: auto; }
        }
    </style>
</head>
<body>

    <h2>🏢 씨앤코 현장주소</h2>
    
    <!-- 검색창을 감싸는 sticky 영역 추가 -->
    <div class="sticky-wrapper">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchData()" placeholder="건설사, 현장명 또는 주소 검색...">
        </div>
    </div>

    <div id="loading">데이터를 불러오고 있습니다...</div>
    <div id="results"></div>

    <script>
        let allData = [];
        const sheetId = '1_XDHj5-AjpU7ZIB0jlgUVDLUJ5y7LlAwRqel-JYpork';
        const sheetName = '원본데이터';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

        async function loadData() {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                allData = json.table.rows.map(row => ({
                    company: row.c[0] ? String(row.c[0].v || "") : "",
                    site: row.c[1] ? String(row.c[1].v || "") : "",
                    address: row.c[2] ? String(row.c[2].v || "") : ""
                })).filter(item => item.company !== "" && item.company !== "건설사");
                document.getElementById('loading').style.display = 'none';
                renderResults(allData);
            } catch (error) {
                document.getElementById('loading').innerText = '데이터를 불러오지 못했습니다.';
            }
        }

        function renderResults(dataList) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            if (dataList.length === 0) {
                resultsDiv.innerHTML = '<p style="color:#999; margin-top:20px;">검색 결과가 없습니다.</p>';
                return;
            }
            dataList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'result-item';
                card.innerHTML = `
                    <div class="info-text"><b>건설사:</b> ${item.company}</div>
                    <div class="info-text"><b>현장명:</b> ${item.site}</div>
                    <div class="info-text"><b>주소:</b> ${item.address}</div>
                    <button class="copy-btn" onclick="copyToClipboard('${item.address}')">주소 복사</button>
                `;
                resultsDiv.appendChild(card);
            });
        }

        function searchData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { renderResults(allData); return; }
            const keywords = query.split(/\s+/);
            const filtered = allData.filter(item => {
                const targetText = (item.company + item.site + item.address).toLowerCase();
                return keywords.every(keyword => targetText.includes(keyword));
            });
            renderResults(filtered);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('주소가 복사되었습니다!\n' + text);
            }).catch(err => {
                alert('복사 실패!');
            });
        }

        loadData();
    </script>
</body>
</html>
